# ============================================================================
# AI tools declaration (transparency only; not penalized)
# ============================================================================
ai_tools_used:
  - "Claude"

ai_usage_summary: |
  Used Claude (Claude Code) for architecture discussion, code review, and to
  help author the ranking engine and reasoning generator. All design decisions,
  the rubric encoding, and the trap/honeypot heuristics were derived from direct
  analysis of the provided dataset. No candidate data is sent to any LLM during
  ranking (the ranking step is fully offline). The optional reasoning upgrade in
  build_reasoning.py only calls an LLM offline and only if an API key is present;
  the shipped submission uses deterministic template reasoning.

# ============================================================================
# Approach summary
# ============================================================================
methodology_summary: |
  Interpretable multi-stage ranker (no trained model — there are zero relevance
  labels). Stages: (1) honeypot hard-reject via impossibility rules
  (tenure>experience, expert-skill-with-0-months, implausible expert breadth);
  (2) structured JD-fit dominated by current-title class and career-history
  SUBSTANCE (prose evidence of building retrieval/ranking/recommendation systems
  in production), not the skills list — directly countering the keyword-stuffer
  trap; (3) a 0.70/0.30 blend with dense cosine (precomputed MiniLM embeddings vs
  the JD's "absolutely need" + ideal-candidate text) so structured signal can't
  be overridden by similarity alone; (4) keyword-stuffer penalty for AI-skills
  under a non-AI title; (5) bounded modifiers for availability (recency,
  recruiter response, open-to-work, verification; 0.5 floor), notice period
  (JD: 30+ raises the bar), GitHub/open-source external validation (small
  asymmetric bonus; sentinel-safe), location, job-hop stability, and a mild
  recruiter-interest/reliability tiebreaker (saves, profile-views, interview-
  completion — capped, since these are partly a popularity proxy). All
  sentinel(-1)/missing values map to neutral, never a penalty. Optimized for
  correctness/inspectability since there is no leaderboard or feedback. Runtime
  well under the 5-min budget (~30-50 s for 100k on CPU).

